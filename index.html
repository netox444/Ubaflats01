<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubaflats - Bem-vindo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(rgba(255,255,255,0.85),rgba(255,255,255,0.9)),
  url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  width:100%;
  max-width:420px;
  padding:40px 25px;
  text-align:center;
  backdrop-filter:blur(6px);
}
.subtitle{letter-spacing:4px;font-size:12px;color:#777;margin-bottom:10px}
h1{font-family:'Playfair Display',serif;font-size:42px;margin-bottom:10px}
.description{font-size:13px;color:#666;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:50px}
.card{
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.4);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:22px 10px;
  cursor:pointer;
  transition:all .25s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:95px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 30px rgba(0,0,0,0.12);
}
.card h3{
  font-size:13px;
  font-weight:500;
  margin-top:6px;
}
.item{cursor:pointer;transition:.25s}
.item:hover{transform:scale(1.1)}
.icon{font-size:28px;margin-bottom:8px}
.label{font-size:11px;color:#444}
.button{
  display:block;width:100%;padding:14px;
  background:#111;color:#fff;text-decoration:none;
  border-radius:14px;font-size:14px;transition:.3s
}
.button:hover{background:#333}
footer{margin-top:25px;font-size:11px;color:#555}

/* Modal Premium */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;justify-content:center;align-items:center;padding:20px
}
.modal-content{
  background:white;padding:30px;border-radius:25px;
  max-width:380px;width:100%;text-align:center;
  animation:fadeIn .3s ease
}
.modal-content h2{margin-bottom:15px;font-family:'Playfair Display',serif}
.close{
  margin-top:20px;background:#111;color:white;
  padding:10px 18px;border:none;border-radius:12px;cursor:pointer
}
@keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
iframe{width:100%;height:250px;border-radius:15px;margin-top:10px;border:none}
</style>
</head>

<body>

<script>
function openModal(title, content) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalContent').innerHTML = content;
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

</html>
